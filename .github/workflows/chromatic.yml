name: Chromatic

# Storybook を Chromatic にデプロイし、PR では visual regression を実行する。
# - main への push: baseline を更新（変更を承認済みとして扱う）
# - PR: 変更された Story の visual regression をチェック
#
# 必須 secret:
#   CHROMATIC_PROJECT_TOKEN  - Chromatic プロジェクトのトークン
#                              https://www.chromatic.com で取得し
#                              GitHub Settings → Secrets → Actions に登録

on:
  push:
    branches: [main]
  pull_request:

# Chromatic は git history を遡って baseline を探すため fetch-depth: 0 が必須
# TurboSnap も diff 解析に git history を使う
jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # storybook:build スクリプトを使ってビルド
          buildScriptName: storybook:build
          # アップロード完了次第ジョブを終了（visual review の承認は GitHub の checks で待つ）
          exitOnceUploaded: true
          # TurboSnap: 変更された Story だけ visual test する
          onlyChanged: true
          # main への push 時のみ自動承認（baseline 更新）
          autoAcceptChanges: ${{ github.ref == 'refs/heads/main' }}
